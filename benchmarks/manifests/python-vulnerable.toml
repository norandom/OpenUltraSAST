[[expected]]
cwe = "CWE-94"
class = "server-side template injection"
path = "app.py"
line = 70
rule_id = "python-ssti"
sink = "render_template_string"
evidence = "render_template_string evaluates attacker-controlled input"

[[expected]]
cwe = "CWE-89"
class = "sql injection"
path = "app.py"
line = 77
sink = "execute"
evidence = "execute runs a SQL query string built from request input on a prior line"

[[expected]]
cwe = "CWE-489"
class = "insecure default"
path = "app.py"
line = 81
rule_id = "python-flask-debug"
sink = "debug"
evidence = "flask debug mode is enabled in production"
