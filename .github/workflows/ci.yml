name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - run: uv sync --group dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src/openultrasast
      - run: uv run pytest
      - name: Detection gate (>=90% recall, <10% FP — hard, score-independent)
        run: uv run python -m openultrasast.gate
      - run: uv run python -m compileall src tests

  dagger:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Must match dagger-io (0.21.7) and dagger/_engine/_version.py CLI_VERSION
      # so the engine image tag is deterministic. The dagger-for-github action
      # runs `docker image inspect registry.dagger.io/engine:v${DAGGER_VERSION}`
      # and skips its own (flaky) pull when the image is already in the local
      # docker cache, so the pinned tag below MUST equal the action's version.
      DAGGER_VERSION: 0.21.7
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Pre-pull dagger engine image (retry transient registry timeouts)
        timeout-minutes: 8
        run: |
          set -euo pipefail
          image="registry.dagger.io/engine:v${DAGGER_VERSION}"
          attempts=5
          for i in $(seq 1 "${attempts}"); do
            echo "::group::Pull attempt ${i}/${attempts}: ${image}"
            if timeout 90 docker pull "${image}"; then
              echo "Pulled ${image} on attempt ${i}"
              docker image inspect "${image}" >/dev/null
              echo "::endgroup::"
              exit 0
            fi
            echo "Pull attempt ${i} failed."
            echo "::endgroup::"
            if [ "${i}" -lt "${attempts}" ]; then
              echo "Retrying in 20s..."
              sleep 20
            fi
          done
          echo "All ${attempts} pull attempts failed for ${image}" >&2
          exit 1
      - uses: dagger/dagger-for-github@v7
        with:
          version: 0.21.7
          verb: run
          args: uv run python dagger/ci.py
